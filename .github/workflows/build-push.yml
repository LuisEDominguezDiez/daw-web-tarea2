name: Build & Push

on:
  workflow_dispatch:
  push:
    branches:
      - test

jobs:
  build-and-push:
    runs-on: self-hosted

    steps:
      - name: Clonar repo
        uses: actions/checkout@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y pushear imagen Docker
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: bboy4ever/daw-web:latest

      - name: Levantar contenedor local
        run: |
          docker run -d -p 8888:80 bboy4ever/daw-web:latest